<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MegaBlaster – Arena of Gestures</title>
  <meta name="description" content="A first-person gesture-controlled arena game. Battle a mage using your body and hands!">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Start Screen / Hub -->
  <div id="startScreen">
    <div id="startContent">
      <h1 id="gameTitle">MEGA<span>BLASTER</span></h1>
      <p id="gameSubtitle">Arena of Gestures</p>

      <!-- Player Coins -->
      <div id="playerCoins">
        <span id="playerCoinsIcon">🪙</span>
        <span id="playerCoinsAmount">0</span>
      </div>

      <!-- Stage Cards (generated dynamically by hub.js) -->
      <div id="stageList"></div>

      <div id="instructions">
        <div class="instruction-item">
          <span class="instruction-icon">🏃</span>
          <span>Lean your body to orbit the arena</span>
        </div>
        <div class="instruction-item">
          <span class="instruction-icon">✊➡️🖐️</span>
          <span>Right fist → open = Fire attack</span>
        </div>
        <div class="instruction-item">
          <span class="instruction-icon">✊➡️🖐️</span>
          <span>Left fist → open = Wind attack</span>
        </div>
        <div class="instruction-item">
          <span class="instruction-icon">🙌</span>
          <span>Raise both hands = Invisibility</span>
        </div>
      </div>
      <p id="webcamNote">⚠️ Webcam access required</p>
    </div>
  </div>

  <!-- Only hub scripts needed -->
  <script src="js/stages.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/hub.js"></script>
</body>
</html>
